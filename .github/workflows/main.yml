name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ./.github/actions/setup-action
      - run: pnpm lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_JOB_NUMBER: 1
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ./.github/actions/setup-action
      - run: pnpm run build

      - uses: daniel-statsig/size-limit-action@8a9389e94961464c6ea137d06d519745dcda163e # main
        if: github.event_name == 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          script: pnpm run size --json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: './dist/samples/web-minified'

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: 'js-client-monorepo-packages-dist'
          if-no-files-found: error
          path: ./dist/packages

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ./.github/actions/setup-action
      - run: |
          pnpm run test --testPathIgnorePatterns=MemoryLeak.test.ts
          pnpm exec nx run statsig-combo:test --testPathPattern=MemoryLeak.test.ts
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ./.github/actions/setup-action
      - run: pnpm exec nx run next-js-sample-e2e:e2e

  deploy:
    if: github.event_name == 'push' && github.event.repository.private
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: 'pages'
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
